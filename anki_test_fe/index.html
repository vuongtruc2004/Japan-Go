<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="card">
      <div class="sentence">{{Sentence}}</div>
      <div class="sentence-meaning">⇒ {{SentenceMeaning}}</div>

      <hr />

      <div class="explanation">Ý nghĩa:</div>
      <div class="content">{{Explanation}}</div>
      <div class="translation">=> Dịch là: "{{Translation}}"</div>

      <div class="structure">Cấu trúc:</div>
      <div class="content">{{Structure}}</div>

      <div class="example">Ví dụ:</div>
      <div class="content">{{Example}}</div>

      <div class="attention">Chú ý bổ sung:</div>
      <div class="content">{{AdditionalNote}}</div>

      <hr />
      <div class="location">Vị trí:</div>
      <div class="content">{{Location}}</div>
    </div>
  </body>
</html>

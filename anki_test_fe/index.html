<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="card">
      <div class="jp-sentence">{{JpSentence}}</div>
      <div class="vn-sentence">⇒ {{VnSentence}}</div>

      <hr />
      <div class="grammar">{{Grammar}}</div>

      <div class="meaning">Ý nghĩa:</div>
      <div class="content">{{GrammarMeaning}}</div>

      <div class="structure">Cấu trúc:</div>
      <div class="content">{{GrammarStructure}}</div>

      <div class="example">Ví dụ:</div>
      <div class="content">{{GrammarExample}}</div>

      <div class="note">Chú ý bổ sung:</div>
      <div class="content">{{GrammarNote}}</div>

      <hr />
      <div class="location">Vị trí:</div>
      <div class="content">{{GrammarLocation}}</div>
    </div>
  </body>
</html>
